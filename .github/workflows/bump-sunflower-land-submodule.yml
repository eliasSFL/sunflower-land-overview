name: Bump sunflower-land submodule to main

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          ssh-key: ${{ secrets.SUBMODULE_BUMP_DEPLOY_KEY }}
          persist-credentials: true

      - name: Fast-forward submodule to upstream main
        run: git submodule update --remote --depth 1 -- sunflower-land

      - name: Commit and push if pointer changed
        run: |
          if git diff --quiet -- sunflower-land; then
            echo "Submodule already at main HEAD; nothing to commit."
            exit 0
          fi
          NEW_SHA=$(git -C sunflower-land rev-parse --short HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sunflower-land
          git commit -m "Bump sunflower-land submodule to ${NEW_SHA}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin master
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed (likely a race with a concurrent merge); retrying..."
          done
          echo "Push still failing after 5 attempts; giving up." >&2
          exit 1
