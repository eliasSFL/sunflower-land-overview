name: Sync master to development

# Whenever a commit lands on master, merge it into development so the
# two branches never drift. Conflicts fall through as a workflow
# failure — at that point a human needs to merge by hand.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-master-to-development
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
          persist-credentials: true

      - name: Merge master into development
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin development master
            git reset --hard origin/development

            if git merge-base --is-ancestor origin/master HEAD; then
              echo "development already contains master; nothing to do."
              exit 0
            fi

            if ! git merge --no-ff --no-edit \
              -m "[CHORE] Merge master into development" origin/master; then
              git merge --abort || true
              echo "::error::Merge conflict syncing master into development. Resolve manually." >&2
              exit 1
            fi

            if git push origin HEAD:development; then
              exit 0
            fi
            echo "Push attempt ${attempt} failed (likely a race with a concurrent push to development); retrying..."
          done
          echo "Push still failing after 5 attempts; giving up." >&2
          exit 1
