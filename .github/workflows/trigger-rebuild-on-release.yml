name: Trigger prod rebuild on release

# Cloudflare Workers Builds only watches branch pushes, not tags. When
# a `v*` tag is pushed (either via `git push --tags` or by publishing a
# GitHub Release that creates the tag), this workflow pushes an empty
# commit to master so the next Workers Build picks the new tag up via
# `git describe --tags` and bakes it into the version chip.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          # The default GITHUB_TOKEN can push to non-protected branches.
          # If master has a ruleset blocking direct pushes, either add
          # `github-actions[bot]` to its bypass list or swap this for a
          # PAT stored as a secret (e.g. RELEASE_PUSH_TOKEN) with the
          # bypass permission.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag is reachable from master
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Guard against tags that point at a commit not on master
          # (e.g. tagged off a feature branch by accident). Without this
          # the empty commit we push below would still trigger a deploy,
          # but `git describe` from master HEAD would still find an
          # older tag — producing a confusing chip value.
          if ! git merge-base --is-ancestor "${TAG_NAME}" HEAD; then
            echo "::error::Tag ${TAG_NAME} is not an ancestor of master HEAD; refusing to nudge prod." >&2
            exit 1
          fi

      - name: Push empty commit to master
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "[CHORE] Deploy release ${TAG_NAME}"
          git push origin master
