name: PR validation

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Lint
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm run lint

      - name: Format check
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm run format:check

      - name: Test
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm test

      - name: Build (typecheck + bundle)
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm run build
